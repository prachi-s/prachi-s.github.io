<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prachi Sengar | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f17;
      --panel: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #00e5ff;
      --accent2: #7c3aed;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 20%, #111827, #020617);
      color: var(--text);
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 40px 20px 10px;
    }

    h1 {
      font-weight: 700;
      letter-spacing: 1px;
    }

    .tagline {
      color: var(--muted);
      font-size: 14px;
      margin-top: 8px;
      font-family: 'JetBrains Mono', monospace;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -1;
    }

    .orbit {
      position: relative;
      width: 360px;
      height: 360px;
      margin: 60px auto;
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.2), transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono';
      font-size: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 0 30px rgba(0,229,255,0.2);
    }

    .circle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 90px;
      height: 90px;
      margin: -45px;
      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;

      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);

      font-size: 12px;
      font-family: 'JetBrains Mono';

      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    /* inner content animation instead of parent */
    .circle span {
      display: inline-block;
      transition: transform 0.25s ease;
    }

    /* hover effect */
    .circle:hover span {
      transform: scale(1.15);
    }

    /* glow stays on parent */
    .circle:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(0,229,255,0.4);
    }

    /* circular placement */
    .c1 { transform: rotate(0deg) translate(150px) rotate(0deg); }
    .c2 { transform: rotate(72deg) translate(150px) rotate(-72deg); }
    .c3 { transform: rotate(144deg) translate(150px) rotate(-144deg); }
    .c4 { transform: rotate(216deg) translate(150px) rotate(-216deg); }
    .c5 { transform: rotate(288deg) translate(150px) rotate(-288deg); }

    .line {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 150px;
      height: 1px;
      background: linear-gradient(to right, rgba(0,229,255,0.5), transparent);
      transform-origin: left;
    }

    .l1 { transform: rotate(0deg); }
    .l2 { transform: rotate(72deg); }
    .l3 { transform: rotate(144deg); }
    .l4 { transform: rotate(216deg); }
    .l5 { transform: rotate(288deg); }

    .about {
      max-width: 700px;
      margin: 60px auto;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      font-family: 'JetBrains Mono';
      line-height: 1.7;
    }

    .links {
      text-align: center;
      margin-top: 20px;
    }

    .links svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 12px;
      font-size: 16px;
      text-decoration: none;
      color: var(--text);
      transition: 0.2s;
    }

    .links a:hover {
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent);
    }

    .footer {
      text-align: center;
      margin: 40px;
      font-size: 12px;
      color: var(--muted);
      font-family: 'JetBrains Mono';
    }    

    /* MODAL */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      width: 420px;
      max-width: 90%;
      background: rgba(10,15,25,0.95);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      font-family: 'JetBrains Mono';
      box-shadow: 0 0 30px rgba(0,229,255,0.2);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .close {
      cursor: pointer;
      color: var(--muted);
      float: right;
      margin-bottom: 10px;
    }

    h3 {
      color: var(--accent);
      margin-top: 10px;
    }
  </style>
</head>
